<!DOCTYPE html>
<html>
<head>
    <title>Login SIGEI</title>
</head>
<body>

    <h2>Iniciar Sesión</h2>

    <form method="POST">

        {% csrf_token %}

        <label>Usuario:</label>
        <input type="text" name="username">

        <br><br>

        <label>Contraseña:</label>
        <input type="password" name="password">

        <br><br>

        <button type="submit">
            Ingresar
        </button>

    </form>

</body>
</html>
