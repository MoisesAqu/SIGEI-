{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIGEI v2.0</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: #0f172a;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
        }

        .brand {
            padding: 25px;
            border-bottom: 1px solid #1e293b;
        }

        .brand h4 {
            margin: 0;
            font-weight: bold;
        }

        .brand span {
            font-size: 13px;
            color: #94a3b8;
        }

        .menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 25px;
            color: #e5e7eb;
            text-decoration: none;
            font-weight: 600;
        }

        .menu a:hover {
            background: #1e293b;
            color: #ffffff;
        }

        .menu a.active {
            background: #1d4ed8;
            color: white;
        }

        .user-box {
            border-top: 1px solid #1e293b;
            padding: 18px 25px;
            margin-top: 20px;
        }

        .avatar {
            width: 38px;
            height: 38px;
            background: #f97316;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .logout {
            color: #ef4444 !important;
        }

        .content {
            margin-left: 260px;
            padding: 35px;
            min-height: 100vh;
        }

        .card-sigei {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <h4>🏗️ SIGEI</h4>
        <span>v2.0</span>
    </div>

    <nav class="menu">
        <a href="{% url 'dashboard_admin' %}">
            <i class="bi bi-grid"></i> Dashboard
        </a>

        <a href="{% url 'productos:lista' %}">
    <i class="bi bi-box-seam"></i> Productos
</a> 

        <a href="{% url 'categorias:lista' %}">
            <i class="bi bi-tags"></i> Categorías
        </a>

        <a href="#">
            <i class="bi bi-person-circle"></i> Clientes
        </a>

        <a href="#">
            <i class="bi bi-building"></i> Proveedores
        </a>

        <a href="#">
            <i class="bi bi-cart"></i> Compras
        </a>

        <a href="#">
            <i class="bi bi-credit-card"></i> Ventas POS
        </a>

        <a href="#">
            <i class="bi bi-boxes"></i> Inventario
        </a>

        <a href="#">
            <i class="bi bi-list-check"></i> Kardex
        </a>

        <a href="#">
            <i class="bi bi-exclamation-triangle"></i> Alertas
        </a>

        <a href="#">
            <i class="bi bi-graph-up-arrow"></i> Predicción
        </a>

        <a href="#">
            <i class="bi bi-people"></i> Usuarios
        </a>

        <a href="#">
            <i class="bi bi-shield-check"></i> Auditoría
        </a>

        <a href="#">
            <i class="bi bi-file-earmark-bar-graph"></i> Reportes
        </a>

        <a href="#">
            <i class="bi bi-book"></i> Manuales
        </a>
    </nav>

    <div class="user-box">
        <div class="d-flex align-items-center mb-3">
            <div class="avatar">AD</div>
            <div>
                <strong>Admin User</strong><br>
                <small>admin@innovagrupo.com</small>
            </div>
        </div>

        <a href="#" class="d-block text-white text-decoration-none mb-2">
            <i class="bi bi-gear"></i> Configuración
        </a>

        <a href="{% url 'logout' %}" class="d-block text-decoration-none logout">
            <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
        </a>
    </div>
</aside>

<main class="content">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
